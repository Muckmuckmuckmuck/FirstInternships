  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://firstinternships.com/#org",
        "name": "FirstInternships",
        "url": "https://firstinternships.com/",
        "logo": "https://firstinternships.com/logo.png",
        "description": "FirstInternships helps students land their first internship by reaching out to companies directly with AI-personalized cold emails.",

      },
      {
        "@type": "WebSite",
        "@id": "https://firstinternships.com/#website",
        "url": "https://firstinternships.com/",
        "name": "FirstInternships",
        "publisher": { "@id": "https://firstinternships.com/#org" },
        "potentialAction": {
          "@type": "SearchAction",
          "target": { "@type": "EntryPoint", "urlTemplate": "https://firstinternships.com/app?search={search_term_string}" },
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@type": "SoftwareApplication",
        "name": "FirstInternships",
        "applicationCategory": "BusinessApplication",

          { "@type": "Offer", "price": "0", "priceCurrency": "USD", "name": "Free plan" },
          { "@type": "Offer", "price": "20", "priceCurrency": "USD", "name": "Pro plan" }
        ]
      },
      {
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How do I get my first internship?",
            "acceptedAnswer": { "@type": "Answer", "text": "One of the most effective ways to get your first internship is to email companies directly instead of only applying through job boards. Many smaller companies and startups never post internships publicly and hire students who reach out. FirstInternships gives you verified company contacts, writes a personalized cold email for each one based on your background, and lets you send it from your own Gmail." }
          },
          {
            "@type": "Question",
            "name": "Does cold emailing companies work for internships?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes, especially for smaller companies and startups. A short, specific, well-written cold email to the right inbox often gets responses that job-board applications never do, because you are reaching a real person instead of an applicant-tracking system." }
          },
          {
            "@type": "Question",
            "name": "Do I need experience to get an internship?",
            "acceptedAnswer": { "@type": "Answer", "text": "No. Students at every level use direct outreach to land a first internship, from high school through career changers. What matters is a genuine, specific email that connects your background to what the company does." }
          },
          {
            "@type": "Question",
            "name": "How much does FirstInternships cost?",
            "acceptedAnswer": { "@type": "Answer", "text": "There is a free plan that unlocks 5 contacts per day. Pro is $20 per month and unlocks 1,000 contacts per month, plus AI firm discovery. Writing emails and sending follow-ups to any unlocked contact is always unlimited and free." }
          }
        ]
      }
    ]
  }
  </script>
